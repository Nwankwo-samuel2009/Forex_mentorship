{% extends "base.html" %}

{% block title %}{{ post.title }} - Trading Blog{% endblock %}

{% block content %}
<article class="single-post">
    <div class="container">
        <div class="post-header">
            <h1 class="post-title">{{ post.title }}</h1>
            <div class="post-meta">
                <span><i class="far fa-calendar"></i> {{ post.date_posted.strftime('%B %d, %Y') }}</span>
                <span><i class="far fa-user"></i> {{ post.author.username }}</span>
            </div>
        </div>
        
        {% if post.image_url %}
        <div class="post-featured-image">
            <img src="{{ post.image_url }}" alt="{{ post.title }}">
        </div>
        {% endif %}
        
        <div class="post-content">
            {{ post.content | safe }}
        </div>
        
        <div class="post-footer">
            <a href="{{ url_for('blog') }}" class="btn-primary">
                <i class="fas fa-arrow-left"></i> Back to Blog
            </a>
        </div>
    </div>
</article>

<style>
.single-post {
    padding: 120px 0 60px;
}

.post-header {
    text-align: center;
    margin-bottom: 3rem;
}

.post-title {
    font-size: 2.5rem;
    color: #333;
    margin-bottom: 1rem;
}

.post-meta {
    color: #999;
    display: flex;
    gap: 2rem;
    justify-content: center;
}

.post-meta i {
    margin-right: 0.5rem;
    color: #667eea;
}

.post-featured-image {
    margin-bottom: 3rem;
    border-radius: 10px;
    overflow: hidden;
}

.post-featured-image img {
    width: 100%;
    max-height: 500px;
    object-fit: cover;
}

.post-content {
    max-width: 800px;
    margin: 0 auto;
    line-height: 1.8;
    color: #444;
}

.post-content h2 {
    margin: 2rem 0 1rem;
    color: #333;
}

.post-content h3 {
    margin: 1.5rem 0 1rem;
    color: #333;
}

.post-content p {
    margin-bottom: 1.5rem;
}

.post-content ul, .post-content ol {
    margin-bottom: 1.5rem;
    padding-left: 2rem;
}

.post-content li {
    margin-bottom: 0.5rem;
}

.post-content img {
    max-width: 100%;
    border-radius: 5px;
    margin: 1.5rem 0;
}

.post-content blockquote {
    border-left: 4px solid #667eea;
    padding: 1rem 2rem;
    background: #f8f9fa;
    margin: 1.5rem 0;
    font-style: italic;
}

.post-footer {
    margin-top: 4rem;
    text-align: center;
    padding-top: 2rem;
    border-top: 1px solid #eee;
}

@media (max-width: 768px) {
    .post-title {
        font-size: 2rem;
    }
    
    .post-meta {
        flex-direction: column;
        gap: 0.5rem;
    }
}
</style>
{% endblock %}
